<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CharterHub</title>
    <!-- CSS Assets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg-main);
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--color-bg-surface);
            padding: 3rem 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            animation: authCardFade 0.6s ease-out;
        }
        @keyframes authCardFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text-heading);
        }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg-main);
            transition: all var(--transition-fast);
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 3px rgba(var(--color-secondary-rgb), 0.1);
        }
        .social-btn {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 500;
            color: var(--color-text-main);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .social-btn:hover {
            background: var(--color-bg-alt);
            border-color: var(--color-secondary);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--color-text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            /* border-bottom: 1px solid var(--color-border); */
        }
        .divider:not(:empty)::before { margin-right: 1.5rem; }
        .divider:not(:empty)::after { margin-left: 1.5rem; }
        
        .auth-toggles {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.75rem;
            z-index: 1000;
        }
        .signup-link {
            font-weight: 600;
            color: var(--color-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
        }
        .signup-link:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .auth-card { padding: 2.5rem 1.5rem; }
            .auth-toggles { top: 1rem; right: 1rem; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>
    <div class="auth-toggles">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode"><i data-lucide="moon"></i></button>
        <button id="rtl-toggle" class="rtl-toggle-btn" aria-label="Toggle RTL" style="font-weight: 800; font-size: 0.75rem;">RTL</button>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <a href="index.html" style="font-family: var(--font-family-serif); font-size: 2.25rem; font-weight: 700; color: var(--color-secondary); text-decoration: none; display: inline-block; margin-bottom: 1rem;">CharterHub</a>
                <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--color-text-heading);">Welcome Back</h1>
                <p style="color: var(--color-text-muted);">Please enter your details to sign in</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input has-icon-right" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                            <i data-lucide="eye" class="eye-icon"></i>
                            <i data-lucide="eye-off" class="eye-off-icon" style="display: none;"></i>
                        </button>
                    </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                        <input type="checkbox" id="remember" style="width: 18px; height: 18px; accent-color: var(--color-secondary); cursor: pointer;">
                        <span style="font-size: 0.9rem; color: var(--color-text-main);">Stay signed in for 30 days</span>
                    </label>
                    <a href="#" style="font-size: 0.85rem; color: var(--color-secondary); font-weight: 500;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem;">Sign In</button>
            </form>

            <div class="divider">OR CONTINUE WITH</div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/></g></svg>
                    Google
                </button>
                <button class="social-btn">
                    <svg viewBox="0 0 384 512" width="18" height="18" fill="var(--color-text-heading)" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                    Apple
                </button>
            </div>

            <p style="text-align: center; margin-top: 2.5rem; color: var(--color-text-muted); font-size: 0.95rem;">
                New to CharterHub? <a href="signup.html" class="signup-link">Create an account</a>
            </p>
        </div>
    </div>

    <!-- JS Assets -->
    <button id="back-to-top" title="Back to Top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
