<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | CharterHub Dashboard</title>
    <!-- CSS Assets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dashboard-content { padding: 2rem; max-width: 1000px; width: 100%; margin: 0 auto; }
        
        .settings-grid { display: block; margin-top: 2rem; }
        .settings-nav { display: flex; flex-direction: column; gap: 0.5rem; }
        .settings-nav-item { padding: 0.75rem 1.25rem; border-radius: var(--radius-md); color: var(--color-text-muted); font-weight: 500; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; gap: 0.75rem; white-space: nowrap; flex-shrink: 0; }
        .settings-nav-item:hover { background: var(--color-bg-alt); color: var(--color-text-main); }
        .settings-nav-item.active { background: var(--color-primary); color: #fff; }
        
        .settings-card { background: var(--color-bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--color-text-main); }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 1rem; outline: none; transition: border-color var(--transition-fast); background: var(--color-bg-alt); color: var(--color-text-main); }
        .form-control:focus { border-color: var(--color-secondary); }
        
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--color-secondary); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        @media (max-width: 800px) {
            .settings-grid { grid-template-columns: 1fr; }
            .settings-nav { flex-direction: row; overflow-x: auto; padding-bottom: 1rem; }
        }
        
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; align-items: center !important; text-align: center; gap: 1rem !important; }
            .name-grid { grid-template-columns: 1fr !important; }
            .profile-header-actions { justify-content: center; }
            .form-actions { justify-content: center !important; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="navbar-brand">
                    <i data-lucide="graduation-cap"></i>
                    <span>CharterHub</span>
                </a>
                <button id="sidebar-close" class="mobile-menu-toggle" style="background:none; border:none; cursor:pointer;" aria-label="Close sidebar"><i data-lucide="x"></i></button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="user-dashboard.html" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> Dashboard Home
                </a>
                <a href="application-status.html" class="nav-link">
                    <i data-lucide="file-text"></i> My Applications
                </a>
                <a href="child-profile.html" class="nav-link">
                    <i data-lucide="users"></i> Child Profile
                </a>
                <a href="notifications.html" class="nav-link">
                    <i data-lucide="bell"></i> Notifications
                    <span style="background: var(--color-secondary); color: #fff; border-radius: 10px; padding: 0.1rem 0.5rem; font-size: 0.75rem; margin-left: auto;">2</span>
                </a>
                <a href="messages.html" class="nav-link">
                    <i data-lucide="message-square"></i> Messages
                </a>
                <a href="settings.html" class="nav-link active">
                    <i data-lucide="settings"></i> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="sidebar-toggles show-mobile-only">
                    <button class="theme-toggle theme-toggle-btn" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></button>
                    <button class="theme-toggle rtl-toggle-btn" aria-label="Toggle RTL" style="font-weight: 800; font-size: 0.75rem;">RTL</button>
                </div>
                <a href="login.html" class="nav-link nav-link-danger">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dashboard-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="sidebar-toggle" class="mobile-menu-toggle" style="background:none; border:none; cursor:pointer;" aria-label="Open sidebar"><i data-lucide="menu"></i></button>
                    <h2 style="font-size: 1.25rem; font-weight: 600;">Account Settings</h2>
                </div>
                
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="theme-toggle theme-toggle-btn hide-mobile" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></button>
                    <button class="theme-toggle rtl-toggle-btn hide-mobile" aria-label="Toggle RTL" style="font-weight: 800; font-size: 0.75rem;">RTL</button>
                    <div class="user-profile-btn">
                        <div class="user-avatar">SJ</div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="settings-grid">
                    <!-- Nav removed by request -->

                    <div class="settings-card">
                        <div class="profile-header" style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--color-border);">
                            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; flex-shrink: 0;">SJ</div>
                            <div>
                                <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Sara J</h3>
                                <div class="profile-header-actions" style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                                    <button class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.875rem;">Change Photo</button>
                                    <button class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.875rem;">Remove</button>
                                </div>
                            </div>
                        </div>

                        <form>
                            <div class="name-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" class="form-control">
                            </div>

                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" class="form-control">
                            </div>

                            <div style="margin-top: 2rem; border-top: 1px solid var(--color-border); padding-top: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem;">
                                <h4 style="font-size: 1rem; margin-top: 1.5rem;">Notification Preferences</h4>
                                
                                <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
                                    <div>
                                        <p style="font-weight: 500; margin-bottom: 0.25rem;">Email Notifications</p>
                                        <p class="text-muted" style="font-size: 0.875rem;">Receive school updates and reminders via email.</p>
                                    </div>
                                    <label class="toggle-switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
                                    <div>
                                        <p style="font-weight: 500; margin-bottom: 0.25rem;">SMS Alerts</p>
                                        <p class="text-muted" style="font-size: 0.875rem;">Get instant mobile alerts for critical school events.</p>
                                    </div>
                                    <label class="toggle-switch">
                                        <input type="checkbox">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-actions" style="margin-top: 2.5rem; display: flex; justify-content: flex-end;">
                                <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button id="back-to-top" title="Back to Top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        lucide.createIcons();

    </script>
</body>
</html>
