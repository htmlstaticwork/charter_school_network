<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CharterHub</title>
    <!-- CSS Assets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url('assets/images/classroom-community.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 4rem;
        }
        .auth-form-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg-surface);
            padding: 2rem;
            overflow-y: auto;
        }
        .auth-form-inner {
            width: 100%;
            max-width: 450px;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg-main);
            transition: border-color var(--transition-fast);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-secondary);
        }
        .social-btn {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition-fast);
            margin-bottom: 1rem;
        }
        .social-btn:hover {
            background: var(--color-bg-alt);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--color-text-muted);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-border);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        
        @media (max-width: 900px) {
            .auth-image { display: none; }
            .auth-form-wrapper { padding: 3rem 2rem; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>
    <div style="position: fixed; top: 1.5rem; right: 1.5rem; display: flex; gap: 0.75rem; z-index: 1000;">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></button>
        <button id="rtl-toggle" class="theme-toggle" aria-label="Toggle RTL"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg></button>
    </div>

    <div class="auth-container">
        <!-- Visual Side -->
                <!-- Form Side -->
        <div class="auth-form-wrapper" style="width: 100%; max-width: 550px; background: var(--color-bg-surface); padding: 3.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); margin: 3rem auto; flex: none;">
            <div class="auth-form-inner">
                <div style="position: relative; margin-bottom: 2.5rem;">
                    <div style="display: flex; justify-content: center;">
                        <a href="index.html" class="navbar-brand" style="margin-bottom: 0;">
                            <i data-lucide="graduation-cap"></i>
                            <span>CharterHub</span>
                        </a>
                    </div>
                </div>
                <p class="text-muted" style="text-align: center; margin-bottom: 2rem;">Setup your parent profile to get started.</p>

                <form class="auth-form" action="user-dashboard.html">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 1rem; cursor: pointer; padding: 0.5rem; background: var(--color-bg-alt); border-radius: var(--radius-md); border: 1px solid var(--color-border);">
                            <input type="checkbox" id="terms" required style="width: 20px; height: 20px; accent-color: var(--color-secondary); cursor: pointer;">
                            <span style="font-size: 14px; color: var(--color-text-main); line-height: 1.4;">
                                I agree to the <a href="#" style="color: var(--color-secondary); font-weight: 600; text-decoration: underline;">Terms of Service</a> and <a href="#" style="color: var(--color-secondary); font-weight: 600; text-decoration: underline;">Privacy Policy</a>.
                            </span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Create Account</button>
                </form>

                <div class="divider">OR SIGN UP WITH SOCIAL</div>

                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <button class="social-btn" style="margin-bottom: 0;">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/></g></svg>
                    </button>
                    <button class="social-btn" style="margin-bottom: 0;">
                        <i data-lucide="facebook" style="color: #1877F2; width: 20px; height: 20px;"></i>
                    </button>
                </div>

                <p style="text-align: center; margin-top: 2rem; color: var(--color-text-muted);">Already have an account? <a href="login.html" style="font-weight: 600; color: var(--color-primary);">Login</a></p>
            </div>
        </div>
    </div>

    <!-- JS Assets -->
    <button id="back-to-top" title="Back to Top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
